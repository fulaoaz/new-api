name: Sync upstream main

on:
  schedule:
    # GitHub Actions schedules use UTC. Run off-peak every six hours.
    - cron: '17 */6 * * *'
  workflow_dispatch:

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  merge-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fork main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main

      - name: Fetch and merge upstream
        id: merge
        shell: bash
        run: |
          git remote add upstream https://github.com/QuantumNous/new-api.git
          git fetch upstream main
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # The repository GITHUB_TOKEN cannot create or update workflow files.
          # Keep this fork's reviewed workflows while merging every other
          # upstream change, including when only workflow conflicts occur.
          set +e
          git merge --no-commit --no-edit upstream/main
          merge_status=$?
          set -e
          git restore --source=HEAD --staged --worktree -- .github/workflows
          git add -A .github/workflows
          unresolved="$(git diff --name-only --diff-filter=U)"
          if [ -n "$unresolved" ]; then
            printf 'Unresolved upstream merge conflicts:\n%s\n' "$unresolved" >&2
            exit "${merge_status:-1}"
          fi
          git commit --no-edit
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: steps.merge.outputs.changed == 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '>=1.25.1'
          cache: true

      - name: Verify custom endpoint after merge
        if: steps.merge.outputs.changed == 'true'
        run: go test ./controller ./dto

      - name: Push merged main
        if: steps.merge.outputs.changed == 'true'
        run: git push origin HEAD:main

      - name: Publish updated image
        if: steps.merge.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run fork-ghcr.yml --repo "${{ github.repository }}" --ref main
